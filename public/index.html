<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChessLytics - Chess Wrapped 2024</title>
    <link href="https://fonts.googleapis.com/css2?family=League+Spartan:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/styles.css">
    <style>
/* Grid layout for the container */
/* Grid layout for the container */
/* General styles for the container */
.stats-container {
    width: 100%;
    height: 120vh; /* Full height of the viewport */
    position: relative;
    display: flex;
    justify-content: center; /* Centers horizontally */
    align-items: center; /* Centers vertically */
}
.background-overlay, .background-overlay-second {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
}
.content-container {
    width: 100%;
    position: relative;
    display: grid;
    gap: 18px;
    justify-content: center;
    align-items: center;
    margin: 0 auto;
}

/* Row 4 - 1 column (just for 1 stat box at the bottom) */
.row-0 {
    display: grid;
    grid-template-columns: 1fr; /* 1 column in the fourth row */
    gap: 30px;
    margin-bottom: 30px;
}

/* Row 1 - 3 columns */
.row-1 {
    display: grid;
    grid-template-columns: repeat(3, 1fr); /* 3 columns in the first row */
    gap: 30px;
}

/* Row 2 - 2 columns */
.row-2 {
    display: grid;
    grid-template-columns: repeat(2, 1fr); /* 2 columns in the second row */
    gap: 30px;
}

/* Row 3 - 5 columns */
.row-3 {
    display: grid;
    grid-template-columns: repeat(5, 1fr); /* 5 columns in the third row */
    gap: 30px;
}


/* Stat Box styling */
.stat-box {
    padding: 20px;
    background: #EEEED5;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: flex-start;
    gap: 16px;
}

.stat-box2 {
    padding: 20px;
    background: #EEEED5;
    border-radius: 20px;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    align-items: flex-start;
    gap: 16px;
    margin-top: 16px;
}

/* Stat Titles */
.stat-title {
    color: #0A4345;
    font-size: 18.26px;
    font-family: League Spartan;
    font-weight: 400;
    line-height: 18.26px;
}

/* Stat Value */
.stat-value {
    color: #0A4345;
    font-size: 32.38px;
    font-family: League Spartan;
    font-weight: 700;
    line-height: 32.38px;
}

/* Details / Subtitle */
.stat-details {
    color: #0A4345;
    font-size: 18px;
    font-family: League Spartan;
    font-weight: 400;
    line-height: 18px;
}

/* Additional styling for the opponents */
.stat-opponent {
    color: #0A4345;
    font-size: 22px;
    font-family: League Spartan;
    font-weight: 700;
    line-height: 22px;
}

/* Opening names */
.stat-opening {
    color: #0A4345;
    font-size: 22px;
    font-family: League Spartan;
    font-weight: 700;
    line-height: 22px;
}

    </style>
</head>

<body>
    <!-- Background and Overlay -->
    <div id="background"></div>
    <div id="overlay"></div>

    <!-- Content Container -->
    <div id="contentContainer">
        <!-- Main Content -->
        <div style="max-width: 900px; padding: 16px; display: flex; flex-direction: column; justify-content: center; align-items: center; gap: 32px;">
            <!-- Image Above Title -->
            <img src="/static/gift2.png" alt="Chess Image" style="max-width: 180px; margin-bottom: -35px;">
            
            <!-- Title and Instructions -->
            <div style="text-align: center; color: #EEEED5; font-family: 'League Spartan', sans-serif; font-weight: 700; word-wrap: break-word; margin-top: 16px;">
                <div style="font-size: 54px; line-height: 54px;"> 
                    ChessLytics: Chess Wrapped 2024!
                </div>
                <div style="font-size: 30px; font-weight: 400; line-height: 30px; margin-top: 16px;"> 
                    Enter your Chess.com username:
                </div>
            </div>

            <!-- Input Section -->
            <div style="width: 100%; max-width: 580px; padding: 28px; background: #EEEED5; border-radius: 10px; display: flex; justify-content: center; align-items: center;">
                <input type="text" id="username" name="username" placeholder="e.g. EdwardL903" required style="width: 100%; max-width: 620px; height: 32px; font-family: 'League Spartan', sans-serif; font-size: 30px; text-align: center; color: #2D6056;">
            </div>

            <!-- Button Section -->
            <div style="width: 100%; max-width: 580px; padding: 28px; border-radius: 10px; border: 5px #EEEED5 solid; display: flex; justify-content: center; align-items: center;">
                <button id="submitBtn" style="width: 380px; height: 32px; font-family: 'League Spartan', sans-serif; font-weight: 700; font-size: 30px; text-align: center; color: #EEEED5; background: transparent; border: none; cursor: pointer;">
                    Generate Chess Analytics
                </button>
            </div>

            <!-- Loading Message and Result Section -->
            <div id="loadingMessage" style="display: none; font-family: 'League Spartan', sans-serif; font-weight: 700; text-align: center; font-size: 14px; color: white; margin-top: 10px;">
                Generating Chess Analytics...
            </div>
            <div class="result" id="result" style="display: none; margin-top: 24px; text-align: center; width: 100%; z-index: 10;">
                <!-- Dynamic Results Populated Here -->
            </div>
            <footer style="color: #EEEED5; text-align: center; padding-top: 160px; font-family: 'League Spartan', sans-serif;">
                <p>&copy; 2025 Edward Lai, Emai Lai, and Thomas Lai. All rights reserved.</p>
                <p>Designed and Developed by Edward Lai, Emai Lai, and Thomas Lai</p>
                <p>Contact us: <a href="mailto:EdwardL9039@gmail.com" style="color: #EEEED5; text-decoration: none;">EdwardL9039@gmail.com</a></p>
            </footer>
        </div>
    </div>


    <script>
    document.getElementById('submitBtn').addEventListener('click', function() {
    const username = document.getElementById('username').value;
    const loadingMessage = document.getElementById('loadingMessage');
    const submitBtn = document.getElementById('submitBtn');
    const resultContainer = document.getElementById('result');
    const contentContainer = document.getElementById('contentContainer');  // Reference to the content container
    

    if (!username) {
        alert('Please enter a username.');
        return;
    }

    // Show the loading message
    loadingMessage.style.display = 'block';
    submitBtn.disabled = true;

    // Clear the result container and hide it initially
    resultContainer.innerHTML = '';
    resultContainer.style.display = 'none';

    // Fetch data from the backend
    fetch('http://127.0.0.1:5000/generate', {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({ username: username }),
    })
    .then(response => response.json())
    .then(data => {
        console.log('Received data:', data); // Log the data to verify if it's correct
        loadingMessage.style.display = 'none';  // Hide loading message
        submitBtn.disabled = false;
        

        if (data.total_time_spent) {
    // Show the result container
    console.log(data); // Check the structure of 'data'

    resultContainer.style.display = 'block';
    

    // Create a stats container to display analytics data
    const statsContainer = document.createElement('div');
    statsContainer.innerHTML = `
    <div class="stats-container">
        <div class="background-overlay"></div>
        <div class="background-overlay-second"></div>
        <div class="content-container">
            <!-- First row with Profile -->
            <div class="row row-0" style="
            display: flex;
            flex-direction: row;
            justify-content: center;
            align-items: center;
            padding: 0px;
            gap: 28px;
            width: 1133.87px;
            height: 115.46px;
            flex: none;
            order: 0;
            flex-grow: 0;
        ">
            <div class="stat-box" style="
                padding: 20px;
                background: none;
                border-radius: 20px;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                gap: 16px;
            ">
                <div class="stat-title" style="
                    color: #EEEED5;
                    font-size: 40px;
                    font-family: 'League Spartan', sans-serif;
                    font-weight: 500;
                    line-height: 100%;
                ">@${data.my_username}'s 2024 CHESS.COM WRAPPED by Chesslytics.xyz</div>
                    <img src="${data.my_avatar}" alt="${data.my_username}'s avatar" style="border-radius: 50%; width: 100px; height: 100px;">

            </div>
            </div>
            <!-- First row with 3 stat boxes -->
            <div class="row row-1">
                <div class="stat-box">
                    <div class="stat-title">TOTAL GAMES</div>
                    <div class="stat-value">${data.total_games}</div>
                    <div class="stat-details">${data.total_win_draw_loss.win} wins / ${data.total_win_draw_loss.draw} draws / ${data.total_win_draw_loss.lose} losses</div>
                </div>
                <div class="stat-box">
                    <div class="stat-title">MINUTES PLAYED</div>
                    <div class="stat-value">${data.total_time_spent.total_time_in_minutes.toFixed(2)}</div>
                    <div class="stat-details">that’s ${data.total_time_spent.total_time}!</div>
                </div>
                <div class="stat-box">
                    <div class="stat-title">YOUR HIGHEST RATING</div>
                    <div class="stat-value">${data.highest_rating.rating}</div>
                    <div class="stat-details">in ${data.highest_rating.time_control} chess, on ${data.highest_rating.date}</div>
                </div>
            </div>

            <!-- Second row with 2 stat boxes -->
            <div class="row row-2">
                <div class="stat-box">
                    <div class="stat-title">MOST PLAYED OPPONENTS</div>
                    <div class="stat-opponent">@${data.most_played_opponent.Opponent["0"]} (${data.most_played_opponent.Games_Played["0"]} games)</div>
                    <div class="stat-opponent">@${data.most_played_opponent.Opponent["1"]} (${data.most_played_opponent.Games_Played["1"]} games)</div>
                    <div class="stat-opponent">@${data.most_played_opponent.Opponent["2"]} (${data.most_played_opponent.Games_Played["2"]} games)</div>
                </div>
                <div class="stat-box">
                    <div class="stat-title">MOST PLAYED OPENINGS</div>
                    <div class="stat-opening">White Opening: ${data.my_openings.white_opening}</div>
                    <div class="stat-opening">Black Opening: ${data.my_openings.black_opening}</div>
                </div>
            </div>

            <!-- Third row with 5 stat boxes -->
            <div class="row row-3">
                <div class="stat-box">
                    <div class="stat-title">FAVORITE TIME CONTROL</div>
                    <div class="stat-value">${Object.entries(data.timecontrol_counts)[0][0]}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-title">NUMBER OF MOVES MADE</div>
                    <div class="stat-value">${data.total_moves}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-title">LONGEST WINNING STREAK</div>
                    <div class="stat-value">${data.longest_winning_streak}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-title">LONGEST LOSING STREAK</div>
                    <div class="stat-value">${data.longest_losing_streak}</div>
                </div>
                <div class="stat-box">
                    <div class="stat-title">MOST HOURS PLAYED IN ONE DAY</div>
                    <div class="stat-details">${data.most_time_spent_day_dict.date}:<br> ${data.most_time_spent_day_dict.time_spent}</div>
                </div>
            </div>

            <!-- Fourth row with 1 stat box -->
        </div>
    </div>

        <!-- Images Container -->
    <div id="imagesContainer" style="display: grid; grid-template-columns: 1fr; gap: 20px; margin-bottom: 30px; margin-top: 100px;">
        <!-- Row for Biggest Victory and Biggest Upset -->
        <div class="stat-title" style="
            color: #EEEED5;
            font-size: 40px;
            font-family: 'League Spartan', sans-serif;
            font-weight: 500;
            line-height: 100%;
        ">Data Visualizations</div>

        ${data.images.map(image => `
            <img src="${image}" alt="Generated Chess Image" style="width: 100%; height: auto; border-radius: 8px; object-fit: contain; margin: 20px;">
        `).join('')}
    </div>
                   
`;

const biggestGamesRow = `
     <!-- Row for Biggest Victory and Biggest Upset -->
     <div class="stat-title" style="
                    color: #EEEED5;
                    font-size: 40px;
                    font-family: 'League Spartan', sans-serif;
                    font-weight: 500;
                    line-height: 100%;
                ">SPECIAL GAME HIGHLIGHTS:</div>
    <div class="row row-2">
        <div class="stat-box2">
            <div class="stat-title">BIGGEST VICTORY</div>
            <div class="stat-opponent">@${data.biggest_games.victory.opp_username}</div>
            <div class="stat-details">Rating: ${data.biggest_games.victory.opp_rating} | Time Control: ${data.biggest_games.victory.time_class}</div>
            <div class="stat-date">Date: ${data.biggest_games.victory.date}</div>
            <a href="${data.biggest_games.victory.link}" target="_blank" class="stat-link">View Game</a>
        </div>
        <div class="stat-box2">
            <div class="stat-title">BIGGEST UPSET</div>
            <div class="stat-opponent">@${data.biggest_games.upset.opp_username}</div>
            <div class="stat-details">Rating: ${data.biggest_games.upset.opp_rating} | Time Control: ${data.biggest_games.upset.time_class}</div>
            <div class="stat-date">Date: ${data.biggest_games.upset.date}</div>
            <a href="${data.biggest_games.upset.link}" target="_blank" class="stat-link">View Game</a>
        </div>
    </div>

    <!-- Row for Biggest Checkmate and Biggest Opponent -->
    <div class="row row-2">
        <div class="stat-box2">
            <div class="stat-title">QUICKEST CHECKMATE</div>
            <div class="stat-opponent">@${data.biggest_games.checkmate.opp_username}</div>
            <div class="stat-details">Rating: ${data.biggest_games.checkmate.opp_rating} | Time Control: ${data.biggest_games.checkmate.time_class}</div>
            <div class="stat-details">Time Spent: ${data.biggest_games.checkmate.time_spent} seconds | Moves: ${data.biggest_games.checkmate.my_num_moves}</div>
            <div class="stat-date">Date: ${data.biggest_games.checkmate.date}</div>
            <a href="${data.biggest_games.checkmate.link}" target="_blank" class="stat-link">View Game</a>
        </div>
        <div class="stat-box2">
            <div class="stat-title">BIGGEST OPPONENT WON AGAINST</div>
            <div class="stat-opponent">@${data.biggest_games.opponent.opp_username}</div>
            <div class="stat-details">Rating: ${data.biggest_games.opponent.opp_rating} | Time Control: ${data.biggest_games.opponent.time_class}</div>
            <div class="stat-date">Date: ${data.biggest_games.opponent.date}</div>
            <a href="${data.biggest_games.opponent.link}" target="_blank" class="stat-link">View Game</a>
        </div>
    </div>

    <!-- Row for Longest Game and Most Moves Game -->
    <div class="row row-2">
        <div class="stat-box2">
            <div class="stat-title">LONGEST GAME</div>
            <div class="stat-opponent">@${data.biggest_games.longest.opp_username}</div>
            <div class="stat-details">Rating: ${data.biggest_games.longest.opp_rating} | Time Control: ${data.biggest_games.longest.time_class}</div>
            <div class="stat-details">Time Spent: ${data.biggest_games.longest.time_spent} seconds</div>
            <div class="stat-date">Date: ${data.biggest_games.longest.date}</div>
            <a href="${data.biggest_games.longest.link}" target="_blank" class="stat-link">View Game</a>
        </div>
        <div class="stat-box2">
            <div class="stat-title">MOST MOVES GAME</div>
            <div class="stat-opponent">@${data.biggest_games.moves.opp_username}</div>
            <div class="stat-details">Rating: ${data.biggest_games.moves.opp_rating} | Time Control: ${data.biggest_games.moves.time_class}</div>
            <div class="stat-details">Moves: ${data.biggest_games.moves.my_num_moves}</div>
            <div class="stat-date">Date: ${data.biggest_games.moves.date}</div>
            <a href="${data.biggest_games.moves.link}" target="_blank" class="stat-link">View Game</a>
        </div>
    </div>

    <!-- Row for Least Time Won and Least Time Lost -->
    <div class="row row-2">
        <div class="stat-box2">
            <div class="stat-title">YOUR LEAST TIME LEFT (Your Victory)</div>
            <div class="stat-opponent">@${data.biggest_games.least_time_won.opp_username}</div>
            <div class="stat-details">Rating: ${data.biggest_games.least_time_won.opp_rating} | Time Control: ${data.biggest_games.least_time_won.time_class}</div>
            <div class="stat-details">Time Left: ${data.biggest_games.least_time_won.my_time_left} seconds</div>
            <div class="stat-date">Date: ${data.biggest_games.least_time_won.date}</div>
            <a href="${data.biggest_games.least_time_won.link}" target="_blank" class="stat-link">View Game</a>
        </div>
        <div class="stat-box2">
            <div class="stat-title">OPPONENT'S LEAST TIME LEFT (Your Defeat)</div>
            <div class="stat-opponent">@${data.biggest_games.least_time_lost.opp_username}</div>
            <div class="stat-details">Rating: ${data.biggest_games.least_time_lost.opp_rating} | Time Control: ${data.biggest_games.least_time_lost.time_class}</div>
            <div class="stat-details">Time Left: ${data.biggest_games.least_time_lost.opp_time_left} seconds</div>
            <div class="stat-date">Date: ${data.biggest_games.least_time_lost.date}</div>
            <a href="${data.biggest_games.least_time_lost.link}" target="_blank" class="stat-link">View Game</a>
        </div>
    </div>

    
`;


    statsContainer.querySelector('#imagesContainer').insertAdjacentHTML('beforebegin', biggestGamesRow);
    resultContainer.appendChild(statsContainer);
    // Smooth scroll to the stats section
    statsContainer.scrollIntoView({ behavior: 'smooth' });

}
                    
             

                

            

                else if (data.error) {
                    // Handle the error message
                    resultContainer.innerHTML = `
                        <p class="error">${data.error}</p>
                    `;
                    resultContainer.style.display = 'block';  // Show the result container even for error
                }
    })
    .catch(error => {
        loadingMessage.style.display = 'none';  // Hide loading message
        submitBtn.disabled = false;

        // Show error in the result container
        resultContainer.style.display = 'block';
        resultContainer.innerHTML = `
            <p class="error">Failed to fetch the data. Please try again later.</p>
        `;
    });

    document.getElementById('username').value = '';
});

    </script>
</body>
</html>
